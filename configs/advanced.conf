
server {
    listen 8080;
    server_name localhost;
    host 0.0.0.0;
    root docs/fusion_web/;
    index index.html;
    error_page 404 /error_pages/404.html;

    location / {
        allow_methods GET;
        autoindex off;
    }

    location /post_body {
        allow_methods POST;
        client_max_body_size 100;
        upload_path ./upload;
        autoindex off;
    }

    location /tours {
        allow_methods GET POST;
        autoindex off;
        index tours1.html;
    }

    location /red {
        return /tours;
    }

    location /directory/ {
        allow_methods GET;
        alias ./YoupiBanane/;
        index youpi.bla;
        cgi_path ../cgi_tester;
        cgi_ext .bla;
        autoindex off;
    }

    location /cgi-bin {
        alias docs/cgi-bin/;
        allow_methods GET POST DELETE;
        autoindex off;
        index time.py;
        cgi_path /usr/bin/python3 /bin/bash;
        cgi_ext .py .sh;
    }
}

server {
    listen 8083;
    server_name localhost;
    host 0.0.0.0;
    root docs/fusion_web/;
    index index2.html;
    error_page 404 /error_pages/404.html;

    # REQUIREMENT: / must respond to GET requests only
    location / {
        allow_methods GET;
        autoindex off;
    }

    # REQUIREMENT: /post_body responds to POST with maxBody 100
    location /post_body {
        allow_methods POST;
        client_max_body_size 100;
        upload_path ./upload;
        autoindex off;
    }

    # REQUIREMENT: /directory/ with alias to YoupiBanane and index youpi.bad_extension
    # Note: If YoupiBanane is a folder inside your repository, use the absolute path.
    # If the extension is listed in cgi_ext, POST is allowed in addition to GET,
    # even if allow_methods only declares GET.
    location /directory/ {
        allow_methods GET;
        alias ./YoupiBanane/;
        index youpi.bad_extension;
        cgi_path ../cgi_tester;
        cgi_ext .bla;
        autoindex off;
    }

    # CRITICAL REQUIREMENT: Any .bla file must execute cgi_test
    # In the 42 webserv project, this is usually handled by extension.

    # NOTE:
        # This server gives CGI priority over the regular allow_methods check.
        # As a result, POST requests to files matching cgi_ext are allowed
        # even if the location itself is declared as GET-only.
}