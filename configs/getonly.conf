server {
    listen 8080;
    server_name localhost;
    host 0.0.0.0;
    root docs/fusion_web/;
    index index.html;
    error_page 404 /error_pages/404.html;

    location / {
        allow_methods GET;
        autoindex off;
    }

    location /post_body {
        allow_methods POST;
        autoindex off;
        upload_path ./uploads;
    }

    location /directory {
        root ./YoupiBanane;
        index youpi.bad_extension;
        allow_methods GET;
        autoindex off;
    }

    location /cgi-bin {
        root docs/cgi-bin;
        allow_methods GET POST DELETE;
        autoindex off;
        index time.py;
        cgi_path /usr/bin/python3 /bin/bash;
        cgi_ext .py .sh;
    }
}