#---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
#                            📌 TESTER CONF 📌
# Setup the configuration file as follows:
# - / must answer to GET requests ONLY
# - Any file with .bla as extension must answer to POST requests by calling the cgi_test executable
# - /post_body must answer to POST requests with a maxBody of 100
# - /directory/ must answer to GET requests and its root must be the YoupiBanane repository; if no file is requested, it must search for youpi.bad_extension files
#---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------

server {
    listen 8080;
    server_name localhost;
    host 0.0.0.0;
    root docs/fusion_web/;
    index index.html;
    error_page 404 /error_pages/404.html;

    # REQUIREMENT: / must respond to GET requests only
    location / {
        allow_methods GET;
        autoindex off;
    }

    # REQUIREMENT: /post_body responds to POST with maxBody 100
    location /post_body {
        allow_methods POST;
        client_max_body_size 100;
        upload_path ./uploads;
        autoindex off;
    }

    # REQUIREMENT: /directory/ with alias to YoupiBanane and index youpi.bad_extension
    # Note: If YoupiBanane is a folder inside your repository, use the absolute path.
    # If the extension is listed in cgi_ext, POST is allowed in addition to GET,
    # even if allow_methods only declares GET.
    location /directory/ {
        allow_methods GET;
        alias ./YoupiBanane/;
        index youpi.bad_extension;
        cgi_path ../cgi_tester;
        cgi_ext .bla;
        autoindex off;
    }

    # CRITICAL REQUIREMENT: Any .bla file must execute cgi_test
    # In the 42 webserv project, this is usually handled by extension.

    # NOTE:
        # This server gives CGI priority over the regular allow_methods check.
        # As a result, POST requests to files matching cgi_ext are allowed
        # even if the location itself is declared as GET-only.
}

#------------------------------------------
#           📌 SUMMARY 📌
# Configuration files allow us to:
#
#   ◉ Define servers and ports
#   ◉ Control routing behavior
#   ◉ Restrict HTTP methods
#   ◉ Manage uploads safely
#   ◉ Execute CGI scripts
#   ◉ Customize error handling
#
# For more information, go to our wiki
#------------------------------------------